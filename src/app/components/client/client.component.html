<div class="row">
	<div class="col-md-8 col-12 mb-3 mb-md-0">
		<h4 class="mb-3">Clients</h4>
		<table class="table table-bordered table-striped table-sm" *ngIf="clients && clients.length; else noClients">
			<thead class="table-light">
				<tr>
					<th>#</th>
					<th>Company</th>
					<th>Contact Person</th>
					<th>Contact No</th>
					<th>Email</th>
					<th>City</th>
					<th>State</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let client of clients; let i = index">
					<td>{{ i + 1 }}</td>
					<td>{{ client.companyName }}</td>
					<td>{{ client.contactPersonName }}</td>
					<td>{{ client.contactNo }}</td>
					<td>{{ client.email }}</td>
					<td>{{ client.city }}</td>
					<td>{{ client.state }}</td>
					<td> 
						<button class="btn btn-sm btn-primary">Edit</button>	 
					</td>
					<td>
						<button class="btn btn-sm btn-danger" (click)="deleteClient(client)">Delete</button>
					</td>
				</tr>
			</tbody>
		</table>
		<ng-template #noClients>
			<div class="alert alert-info mb-0">No clients available. Please add a client.</div>
		</ng-template>
	</div>

	<div class="col-md-4 col-12">
		<h4 class="mb-3">Client Details</h4>
		<form #clientForm="ngForm" (ngSubmit)="saveClient()" class="border rounded p-3 bg-light">
			<div class="mb-2">
				<label for="companyName" class="form-label">Company Name</label>
				<input
					id="companyName"
					name="companyName"
					type="text"
					class="form-control form-control-sm"
					[(ngModel)]="client.companyName"
					required>
			</div>

			<div class="mb-2">
				<label for="contactPersonName" class="form-label">Contact Person</label>
				<input
					id="contactPersonName"
					name="contactPersonName"
					type="text"
					class="form-control form-control-sm"
					[(ngModel)]="client.contactPersonName">
			</div>

			<div class="mb-2">
				<label for="contactNo" class="form-label">Contact No</label>
				<input
					id="contactNo"
					name="contactNo"
					type="text"
					class="form-control form-control-sm"
					[(ngModel)]="client.contactNo">
			</div>

			<div class="mb-2">
				<label for="email" class="form-label">Email</label>
				<input
					id="email"
					name="email"
					type="email"
					class="form-control form-control-sm"
					[(ngModel)]="client.email">
			</div>

			<div class="mb-2">
				<label for="address" class="form-label">Address</label>
				<textarea
					id="address"
					name="address"
					rows="2"
					class="form-control form-control-sm"
					[(ngModel)]="client.address"></textarea>
			</div>

			<div class="row mb-2">
				<div class="col-6">
					<label for="city" class="form-label">City</label>
					<input
						id="city"
						name="city"
						type="text"
						class="form-control form-control-sm"
						[(ngModel)]="client.city">
				</div>
				<div class="col-6">
					<label for="state" class="form-label">State</label>
					<input
						id="state"
						name="state"
						type="text"
						class="form-control form-control-sm"
						[(ngModel)]="client.state">
				</div>
			</div>

			<div class="row mb-2">
				<div class="col-6">
					<label for="pincode" class="form-label">Pincode</label>
					<input
						id="pincode"
						name="pincode"
						type="text"
						class="form-control form-control-sm"
						[(ngModel)]="client.pincode">
				</div>
				<div class="col-6">
					<label for="employeeStrength" class="form-label">Employee Strength</label>
					<input
						id="employeeStrength"
						name="employeeStrength"
						type="number"
						class="form-control form-control-sm"
						[(ngModel)]="client.employeeStrength">
				</div>
			</div>

			<div class="row mb-2">
				<div class="col-6">
					<label for="gstNo" class="form-label">GST No</label>
					<input
						id="gstNo"
						name="gstNo"
						type="text"
						class="form-control form-control-sm"
						[(ngModel)]="client.gstNo">
				</div>
				<div class="col-6">
					<label for="regNo" class="form-label">Reg No</label>
					<input
						id="regNo"
						name="regNo"
						type="text"
						class="form-control form-control-sm"
						[(ngModel)]="client.regNo">
				</div>
			</div>

			<div class="d-flex justify-content-between mt-3">
				<button type="submit" class="btn btn-success btn-sm" (click)="saveClient()">Save Client</button>
				<button type="button" class="btn btn-secondary btn-sm" (click)="resetClient()">Reset</button>
			</div>
		</form>
	</div>
</div>
